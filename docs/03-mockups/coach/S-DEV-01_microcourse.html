<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Micro-course — AnCare</title>
<link rel="stylesheet" href="../_assets/_tokens.css"><link rel="stylesheet" href="../_assets/_base.css">

</head><body><div class="screen">
<div class="appbar"><span class="back"><svg class="icon" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg></span><h1>Micro-course</h1><span class="info"><svg class="icon" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="8.01"/><line x1="12" y1="12" x2="12" y2="16"/></svg></span></div>
<div class="content" style="padding-top:var(--s-12)">
  <div class="focus-card" style="margin-bottom:var(--s-16)">
    <div class="label">Bài học 3 phút</div>
    <div class="title" style="font-size:var(--text-xl)">Nước & trao đổi chất</div>
  </div>
  <div class="card" style="padding:0;overflow:hidden">
    <div style="height:180px;background:linear-gradient(135deg,var(--accent),var(--accent-hover));display:flex;align-items:center;justify-content:center;color:#fff">
      <div style="text-align:center"><svg class="icon-lg" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg><div style="margin-top:var(--s-12);font-weight:700">▶ Phát video</div></div>
    </div>
  </div>
  <div class="card">
    <h2>Nội dung chính</h2>
    <div class="card subtle">
      <div class="hint" style="line-height:1.7">1. Vai trò của nước trong trao đổi chất.<br>2. Dấu hiệu cơ thể thiếu nước.<br>3. Công thức uống nước cá nhân hóa.</div>
    </div>
  </div>
  <div class="card">
    <h2>3 câu kiểm tra</h2>
    <div class="field" style="margin-bottom:var(--s-12)"><label>Điều gì xảy ra khi thiếu nước?</label><textarea style="min-height:60px"></textarea></div>
    <div class="field" style="margin-bottom:var(--s-12)"><label>Bạn sẽ áp dụng như thế nào?</label><textarea style="min-height:60px"></textarea></div>
    <div class="field"><label>Bạn sẽ chia sẻ với ai?</label><textarea style="min-height:60px"></textarea></div>
  </div>
</div>
<div class="cta-bar"><button class="btn primary"><svg class="icon" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>Gửi kết quả</button></div>
</div></body></html>
