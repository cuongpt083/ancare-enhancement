<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Điều chỉnh bữa ăn — AnCare</title>
<link rel="stylesheet" href="../_assets/_tokens.css"><link rel="stylesheet" href="../_assets/_base.css">

</head><body><div class="screen">
<div class="appbar"><span class="back"><svg class="icon" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg></span><h1>Điều chỉnh bữa ăn</h1><span class="info"><svg class="icon" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="8.01"/><line x1="12" y1="12" x2="12" y2="16"/></svg></span></div>
<div class="content" style="padding-top:var(--s-12)">
  <div class="focus-card customer" style="margin-bottom:var(--s-16)">
    <div class="label">Phạm Hạnh</div>
    <div class="title" style="font-size:var(--text-xl)">Bữa tối · 390 kcal</div>
  </div>
  <div class="card">
    <h2>Thay đổi món</h2>
    <div class="flex items-center gap-12" style="padding:var(--s-12) 0;border-bottom:1px solid var(--border)">
      <div class="flex-1">
        <div style="font-weight:600">Cá hấp</div>
        <div class="hint">150g · 200 kcal · 25g đạm</div>
      </div>
      <button class="btn ghost">Thay</button>
    </div>
    <div class="flex items-center gap-12" style="padding:var(--s-12) 0;border-bottom:1px solid var(--border)">
      <div class="flex-1">
        <div style="font-weight:600">Cơm lứt</div>
        <div class="hint">1/2 bát · 130 kcal</div>
      </div>
      <button class="btn ghost">Thay</button>
    </div>
    <div class="flex items-center gap-12" style="padding:var(--s-12) 0">
      <div class="flex-1">
        <div style="font-weight:600">Rau luộc</div>
        <div class="hint">1 đĩa · 60 kcal</div>
      </div>
      <button class="btn ghost">Thay</button>
    </div>
  </div>
  <div class="card">
    <h2>Gợi ý thay thế</h2>
    <div class="flex items-center gap-12" style="padding:var(--s-12) 0;border-bottom:1px solid var(--border)">
      <span style="color:var(--accent-customer)"><svg class="icon" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3zm0 0v7"/></svg></span>
      <div class="flex-1"><div style="font-weight:600">Ức gà luộc</div><div class="hint">150g · 220 kcal · 28g đạm</div></div>
      <button class="pill active" style="border-color:var(--accent-customer);background:var(--accent-customer);color:#fff">Chọn</button>
    </div>
    <div class="flex items-center gap-12" style="padding:var(--s-12) 0">
      <span style="color:var(--accent-customer)"><svg class="icon" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3zm0 0v7"/></svg></span>
      <div class="flex-1"><div style="font-weight:600">Đậu phụ rim</div><div class="hint">150g · 180 kcal · 15g đạm</div></div>
      <button class="pill">Chọn</button>
    </div>
  </div>
</div>
<div class="cta-bar"><button class="btn primary"><svg class="icon" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>Lưu thay đổi</button></div>
</div></body></html>
