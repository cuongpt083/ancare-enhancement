<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Đăng nhập — AnCare</title>
<link rel="stylesheet" href="../_assets/_tokens.css"><link rel="stylesheet" href="../_assets/_base.css">

</head><body><div class="screen">
<div class="appbar" style="background:transparent;border:none"><span class="back" style="opacity:0"><svg class="icon" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg></span><h1></h1><span class="info" style="opacity:0"><svg class="icon" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="8.01"/><line x1="12" y1="12" x2="12" y2="16"/></svg></span></div>
<div class="content no-nav" style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding-top:0">
  <div style="width:72px;height:72px;border-radius:var(--radius-lg);background:linear-gradient(135deg,var(--accent),var(--accent-hover));display:flex;align-items:center;justify-content:center;color:#fff;margin-bottom:var(--s-24)">
    <svg class="icon-lg" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
  </div>
  <h2 style="margin:0 0 4px;font-size:var(--text-2xl)">AN Care</h2>
  <p style="color:var(--text-muted);margin:0 0 var(--s-32)">Sống khỏe mỗi ngày</p>
  <div class="card" style="width:100%;margin-bottom:0">
    <div class="field">
      <label>Số điện thoại hoặc Email</label>
      <input type="text" placeholder="Nhập số điện thoại hoặc email">
    </div>
    <div class="field">
      <label>Mật khẩu</label>
      <div style="position:relative">
        <input type="password" placeholder="Nhập mật khẩu">
        <span style="position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--text-muted)"><svg class="icon" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></span>
      </div>
    </div>
    <button class="btn primary block" style="margin:var(--s-8) 0">Đăng nhập</button>
    <div class="flex justify-between" style="margin-top:var(--s-12)">
      <a href="#" style="font-size:var(--text-sm);color:var(--text-muted);text-decoration:none">Quên mật khẩu?</a>
      <a href="#" style="font-size:var(--text-sm);color:var(--accent);text-decoration:none;font-weight:600">Đăng ký</a>
    </div>
  </div>
  <div class="hint text-center" style="margin-top:var(--s-16)">Face ID sẽ tự động kích hoạt khi có sẵn</div>
</div>
</div></body></html>
