<!-- Mockup US-E01-02 Thêm mới KH (Card Thông tin cơ bản + người mời Q32) | Khuôn T1 | HLV (draft §2.4.1) -->
<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Thêm mới KH — AnCare</title>
<link rel="stylesheet" href="../_assets/_tokens.css"><link rel="stylesheet" href="../_assets/_base.css">
</head><body><div class="screen">
  <div class="appbar"><span class="back">‹</span><h1>Thêm mới KH</h1><span class="info">ⓘ</span></div>
  <div class="content">
    <div class="card">
      <h2>Card Thông tin cơ bản</h2>
      <div class="search" style="margin-bottom:8px"><input value="HLV Thủy (mặc định)" placeholder="Tên người mời *"></div>
      <div class="search" style="margin-bottom:8px"><input placeholder="SĐT người mời"></div>
      <div class="hint" style="margin-bottom:12px">Người mời = HLV hoặc KH đại sứ/bảo trợ (Q32 — mặc định HLV đăng nhập, có thể đổi)</div>
      <div class="search" style="margin-bottom:8px"><input placeholder="Họ và tên KH *"></div>
      <div class="search" style="margin-bottom:8px"><input placeholder="Số điện thoại (chống trùng D15)"></div>
      <div class="search" style="margin-bottom:8px"><input placeholder="Email"></div>
      <div class="search" style="margin-bottom:8px"><input placeholder="Ngày sinh (dd/mm/yyyy)"></div>
      <div style="display:flex;gap:8px;margin-bottom:8px">
        <div class="search" style="flex:1"><input placeholder="Chiều cao (cm)"></div>
        <div class="search" style="flex:1"><input placeholder="Cân nặng (kg)"></div>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:8px">
        <div class="search" style="flex:1"><span style="color:var(--text-muted);font-size:13px">Giới tính:</span></div>
        <div style="flex:1.5;display:flex;gap:4px">
          <span class="chip accent">Nam (mặc định)</span>
          <span class="chip">Nữ</span>
          <span class="chip">Khác</span>
        </div>
      </div>
      <div class="search"><input placeholder="Địa chỉ"></div>
    </div>
    <div class="card subtle"><div class="hint">Sau Lưu → chuyển sang "Chân dung KH" (US-E02-02 — gộp khảo sát mục tiêu, Q35)</div></div>
  </div>
  <div class="cta-bar"><button class="btn secondary">Hủy</button><button class="btn primary">Lưu → Chân dung KH</button></div>
</div></body></html>
