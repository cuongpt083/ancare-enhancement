<!-- Mockup US-E02-03 Hướng dẫn đo Tanita | Khuôn T1 | HLV -->
<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Đo lường Tanita — AnCare</title>
<link rel="stylesheet" href="../_assets/_tokens.css"><link rel="stylesheet" href="../_assets/_base.css">
</head><body><div class="screen">
  <div class="appbar"><span class="back">‹</span><h1>Đo lường Tanita</h1><span class="info">ⓘ</span></div>
  <div class="progress-dots"><span class="dot done"></span><span class="dot done"></span><span class="dot active"></span><span class="dot"></span><span class="dot"></span></div>
  <div class="content">
    <div class="card">
      <h2>Thông tin cơ bản</h2>
      <div class="search"><input placeholder="Tên (điền sẵn: Phạm Hạnh)"></div>
      <div class="search" style="margin-top:8px"><input placeholder="Tuổi · 42"></div>
      <div class="search" style="margin-top:8px"><input placeholder="Chiều cao (cm)"></div>
    </div>
    <div class="card">
      <h2>Checklist tư thế đo</h2>
      <div class="list-item"><div class="avatar">✓</div><div class="meta"><div class="name">Tháo chìa khóa, bỏ điện thoại</div></div></div>
      <div class="list-item"><div class="avatar">✓</div><div class="meta"><div class="name">Chạm gót chân vào điện cực</div></div></div>
      <div class="list-item"><div class="avatar">✓</div><div class="meta"><div class="name">Đứng thẳng, nhìn thẳng</div></div></div>
      <div class="list-item alert"><div class="avatar" style="color:var(--state-alert)">!</div><div class="meta"><div class="name">KHÔNG cúi đầu nhìn xuống</div></div></div>
    </div>
    <div class="card">
      <h2>Nhập chỉ số</h2>
      <button class="btn primary" style="width:100%;margin-bottom:8px">📷 Chụp ảnh cân Tanita (OCR)</button>
      <div class="hint" style="text-align:center">hoặc</div>
      <button class="btn secondary" style="width:100%;margin-top:8px">Nhập tay</button>
      <div class="hint">OCR nhận: cân nặng · mỡ% · cơkg · nước% · mỡ nội tạng · xương · tuổi sinh học · BMR</div>
    </div>
  </div>
  <div class="cta-bar"><button class="btn secondary">‹ Quay lại</button><button class="btn primary">Tạo bản phân tích →</button></div>
</div></body></html>
