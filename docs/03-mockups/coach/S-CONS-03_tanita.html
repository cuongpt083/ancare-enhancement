<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Khảo sát Tanita — AnCare</title>
<link rel="stylesheet" href="../_assets/_tokens.css"><link rel="stylesheet" href="../_assets/_base.css">

</head><body><div class="screen">
<div class="appbar"><span class="back"><svg class="icon" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg></span><h1>Khảo sát Tanita</h1><span class="info"><svg class="icon" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="8.01"/><line x1="12" y1="12" x2="12" y2="16"/></svg></span></div>
<div class="progress-dots"><span class="dot done"></span><span class="dot done"></span><span class="dot active"></span><span class="dot "></span></div>
<div class="content" style="padding-top:var(--s-12)">
  <div class="card">
    <h2>Nhập nhanh từ ảnh</h2>
    <div class="flex gap-12">
      <button class="btn secondary flex-1" style="height:48px"><svg class="icon" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg> Chụp ảnh</button>
      <button class="btn secondary flex-1" style="height:48px"><svg class="icon" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg> Chọn ảnh</button>
    </div>
    <div class="hint" style="margin-top:var(--s-12)">OCR tự nhận chỉ số từ màn hình cân Tanita. HLV kiểm tra & sửa.</div>
  </div>
  <div class="card">
    <h2>Hoặc nhập tay</h2>
    <div class="field"><label>Cân nặng (kg)</label><input value="64.8"></div>
    <div class="field"><label>Tỷ lệ mỡ cơ thể (%)</label><input value="18.9"></div>
    <div class="field"><label>Khối lượng xương (kg)</label><input value="2.8"></div>
    <div class="field"><label>Tỷ lệ nước (%)</label><input value="57.7"></div>
    <div class="field"><label>Khối lượng cơ (kg)</label><input value="52.0"></div>
    <div class="field"><label>Vóc dáng</label><input value="Bình thường"></div>
    <div class="field"><label>Tuổi sinh học</label><input value="37"></div>
    <div class="field"><label>Năng lượng nghỉ ngơi (kcal)</label><input value="1276"></div>
    <div class="field"><label>Tỷ lệ mỡ nội tạng (1-50)</label><input value="10"></div>
  </div>
</div>
<div class="cta-bar"><button class="btn primary"><svg class="icon" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/></svg>Tạo bản tư vấn</button></div>
</div></body></html>
